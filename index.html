<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f7f7f7;
}

/* 🔥 контейнер */
.wrapper {
  position: relative;
}

/* 🔥 список товарів */
.products {
  padding: 10px;
  padding-bottom: 140px;
}

/* 🔥 карточка */
.card {
  background: white;
  border-radius: 12px;
  margin-bottom: 12px;
  padding: 10px;
}

/* 🔥 кнопки кількості */
.qty-buttons button {
  margin: 4px;
  background: #eee;
  color: black;
}

/* 🔥 НИЖНЯ ПАНЕЛЬ — ВАЖЛИВО */
.bottom {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;

  display: flex;
  justify-content: space-between;
  align-items: center;

  background: white;
  padding: 12px;
  border-top: 1px solid #ddd;

  z-index: 999999; /* 🔥 МАКС */
}

/* 🔥 кнопка */
.order-btn {
  background: #ff4d6d;
  color: white;
  border: none;
  padding: 10px 16px;
  border-radius: 10px;
  font-size: 16px;

  position: relative;
  z-index: 9999999; /* 🔥 ще вище */
}

/* ❗ УБИВАЄ ВСІ ПЕРЕКРИТТЯ */
.bottom,
.order-btn {
  pointer-events: auto !important;
}
</style>
</head>

<body>

<div class="wrapper">

<div class="products" id="products"></div>

<div class="bottom">
  <div>💰 <span id="sum">0</span> грн</div>
  <button class="order-btn" onclick="checkout()">Замовити</button>
</div>

</div>

<script>
const sheetURL = "https://script.google.com/macros/s/AKfycbwy6lgjcTbXFWpRMKLCngkP8gP7oygRjmWXzVY4E5S65bH6KqmUsa6njn-Hiz8hJLCZ9w/exec?v=15";

let cart = [];
let total = 0;
let allProducts = [];

async function loadMenu() {
  const res = await fetch(sheetURL);
  const data = await res.json();

  allProducts = data.map(item => ({
    name: item.name,
    price: Number(item.price) || 0,
    desc: item.desc || "",
    steps: item.steps
      ? item.steps.split(",").map(n => Number(n))
      : [1, 5, 10]
  }));

  renderProducts();
}

function renderProducts() {
  const container = document.getElementById("products");
  container.innerHTML = "";

  allProducts.forEach(p => {
    const el = document.createElement("div");
    el.className = "card";

    const buttons = p.steps.map(s =>
      `<button onclick="addToCart('${p.name}', ${p.price}, ${s})">+${s}</button>`
    ).join("");

    el.innerHTML = `
      <h3>${p.name}</h3>
      <p>${p.desc}</p>
      <b>${p.price} грн</b>
      <div class="qty-buttons">${buttons}</div>
    `;

    container.appendChild(el);
  });
}

function addToCart(name, price, qty) {
  const existing = cart.find(i => i.name === name);

  if (existing) {
    existing.qty += qty;
  } else {
    cart.push({name, price, qty});
  }

  total += price * qty;
  document.getElementById("sum").innerText = total;
}

function checkout() {
  if (cart.length === 0) {
    alert("Кошик пустий");
    return;
  }

  let text = "🧾 Замовлення:\n\n";

  cart.forEach(item => {
    text += `• ${item.name} x${item.qty} — ${item.price * item.qty} грн\n`;
  });

  text += `\n💰 Разом: ${total} грн`;

  if (window.Telegram && Telegram.WebApp) {
    Telegram.WebApp.sendData(text);
  } else {
    alert(text);
  }
}

loadMenu();
</script>

</body>
</html>
