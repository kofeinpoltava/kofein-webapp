<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f7f7f7;
}

.header {
  padding: 15px;
  font-size: 22px;
  font-weight: bold;
}

.categories {
  display: flex;
  gap: 10px;
  padding: 10px;
  overflow-x: auto;
}

.cat {
  background: white;
  padding: 8px 14px;
  border-radius: 20px;
  cursor: pointer;
  white-space: nowrap;
}

.active {
  background: #ff4d6d;
  color: white;
}

.products {
  display: grid;
  grid-template-columns: 1fr;
  gap: 15px;
  padding: 10px;
  padding-bottom: 120px;
}

.card {
  background: white;
  border-radius: 14px;
  overflow: hidden;
  transition: 0.2s;
}

.card:active {
  transform: scale(0.98);
}

.card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
}

.card-content {
  padding: 12px;
}

.bottom {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: white;
  padding: 10px;
  border-top: 1px solid #ddd;
}

button {
  background: #ff4d6d;
  color: white;
  border: none;
  padding: 8px;
  border-radius: 8px;
  width: 100%;
}
</style>
</head>

<body>

<div class="header">🍰 Меню</div>

<div class="categories" id="cats"></div>

<div class="products" id="products"></div>

<div class="bottom">
🛒 <span id="sum">0</span> грн
<button onclick="sendOrder()">Оформити</button>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

// 📦 товари
const products = [
  {name:"Макарон", price:40, cat:"Печиво", img:"https://images.unsplash.com/photo-1551024601-bec78aea704b"},
  {name:"Кукіс", price:40, cat:"Печиво", img:"https://images.unsplash.com/photo-1606313564200-e75d5e30476c"},
  {name:"Чізкейк", price:120, cat:"Торти", img:"https://images.unsplash.com/photo-1612203985729-70726954388c"},
  {name:"Брауні", price:90, cat:"Торти", img:"https://images.unsplash.com/photo-1606312619070-d48b4c652a52"}
];

let currentCat = "Всі";

// 🧠 збережений кошик
let cart = JSON.parse(localStorage.getItem("cart") || "{}");

// категорії
function renderCats(){
  let cats = ["Всі", ...new Set(products.map(p => p.cat))];
  let html = "";

  cats.forEach(c => {
    html += `<div class="cat ${c==currentCat?'active':''}" onclick="selectCat('${c}')">${c}</div>`;
  });

  document.getElementById("cats").innerHTML = html;
}

// вибір категорії
function selectCat(cat){
  currentCat = cat;
  renderCats();
  renderProducts();
}

// товари
function renderProducts(){
  let html = "";

  products
    .filter(p => currentCat==="Всі" || p.cat===currentCat)
    .forEach(p => {
      html += `
      <div class="card">
        <img src="${p.img}">
        <div class="card-content">
          <div><b>${p.name}</b></div>
          <div>${p.price} грн</div>
          <button onclick="add('${p.name}', ${p.price})">Додати</button>
        </div>
      </div>
      `;
    });

  document.getElementById("products").innerHTML = html;
}

// ➕ додати
function add(name, price){
  if(!cart[name]) cart[name] = {price: price, count:0};
  cart[name].count++;

  save();
  update();
}

// 💾 збереження
function save(){
  localStorage.setItem("cart", JSON.stringify(cart));
}

// 💰 сума
function update(){
  let total = 0;

  for(let i in cart){
    total += cart[i].price * cart[i].count;
  }

  document.getElementById("sum").innerText = total;
}

// 📤 замовлення
function sendOrder(){
  if(Object.keys(cart).length === 0){
    alert("Кошик пустий");
    return;
  }

  let text = "🛒 НОВЕ ЗАМОВЛЕННЯ\n\n";
  let total = 0;

  for(let i in cart){
    let p = cart[i];
    text += "🍰 " + i + " x" + p.count + " — " + (p.price*p.count) + " грн\n";
    total += p.price*p.count;
  }

  text += "\n💰 Сума: " + total + " грн";

  if (tg.initDataUnsafe.user) {
    let u = tg.initDataUnsafe.user;
    text += "\n👤 " + (u.username ? "@"+u.username : u.first_name);
  }

  tg.sendData(text);
}

// старт
renderCats();
renderProducts();
update();
</script>

</body>
</html>
