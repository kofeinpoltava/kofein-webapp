<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f7f7f7;
}

.header {
  padding: 15px;
  font-size: 22px;
  font-weight: bold;
}

.products {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  padding: 10px;
  padding-bottom: 120px;
}

.card {
  background: white;
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 4px 10px rgba(0,0,0,0.08);
}

.card img {
  width: 100%;
  height: 130px;
  object-fit: cover;
}

.card-content {
  padding: 10px;
}

.price {
  font-weight: bold;
  margin-bottom: 5px;
}

.controls {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

button {
  background: #ff4d6d;
  color: white;
  border: none;
  padding: 6px 10px;
  border-radius: 6px;
  font-size: 14px;
}

.count {
  font-weight: bold;
}

.bottom {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: white;
  padding: 10px;
  border-top: 1px solid #ddd;
  z-index: 999;
}
</style>
</head>

<body>

<div class="header">🍰 Десерти</div>

<div class="products" id="products"></div>

<div class="bottom">
🛒 <span id="sum">0</span> грн
<button onclick="sendOrder()">Оформити</button>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

// 📦 ТОВАРИ
const products = [
  {name:"Макарон", price:40, img:"https://images.unsplash.com/photo-1551024601-bec78aea704b"},
  {name:"Кукіс", price:40, img:"https://images.unsplash.com/photo-1606313564200-e75d5e30476c"},
  {name:"Чізкейк", price:120, img:"https://images.unsplash.com/photo-1612203985729-70726954388c"},
  {name:"Брауні", price:90, img:"https://images.unsplash.com/photo-1606312619070-d48b4c652a52"}
];

let cart = {};

// 🧱 РЕНДЕР
function render(){
  let html = "";

  products.forEach(p => {
    let count = cart[p.name] ? cart[p.name].count : 0;

    html += `
    <div class="card">
      <img src="${p.img}">
      <div class="card-content">
        <div>${p.name}</div>
        <div class="price">${p.price} грн</div>

        <div class="controls">
          <button onclick="minus('${p.name}')">-</button>
          <div class="count">${count}</div>
          <button onclick="plus('${p.name}', ${p.price})">+</button>
        </div>

      </div>
    </div>
    `;
  });

  document.getElementById("products").innerHTML = html;
}

// ➕
function plus(name, price){
  if(!cart[name]){
    cart[name] = {price: price, count: 0};
  }
  cart[name].count++;
  update();
}

// ➖
function minus(name){
  if(cart[name]){
    cart[name].count--;
    if(cart[name].count <= 0){
      delete cart[name];
    }
  }
  update();
}

// 💰 сума
function update(){
  let total = 0;

  for(let item in cart){
    total += cart[item].price * cart[item].count;
  }

  document.getElementById("sum").innerText = total;
  render();
}

// 📤 замовлення
function sendOrder(){
  if(Object.keys(cart).length === 0){
    alert("Кошик пустий");
    return;
  }

  let text = "🛒 НОВЕ ЗАМОВЛЕННЯ:\n\n";
  let total = 0;

  for(let item in cart){
    let p = cart[item];
    text += "🍰 " + item + " x" + p.count + " — " + (p.price * p.count) + " грн\n";
    total += p.price * p.count;
  }

  text += "\n💰 Сума: " + total + " грн";

  if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
    let user = tg.initDataUnsafe.user;
    text += "\n👤 " + (user.username ? "@" + user.username : user.first_name);
  }

  tg.sendData(text);
}

// перший запуск
render();
</script>

</body>
</html>
