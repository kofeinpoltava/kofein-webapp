<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f7f7f7;
  transition: 0.3s;
}

.dark {
  background: #1c1c1c;
  color: white;
}

.header {
  padding: 15px;
  font-size: 22px;
  font-weight: bold;
  display: flex;
  justify-content: space-between;
}

.products {
  padding: 10px;
}

.card {
  background: white;
  border-radius: 12px;
  margin-bottom: 12px;
  overflow: hidden;
}

.dark .card {
  background: #2a2a2a;
}

.card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
}

.card-content {
  padding: 10px;
}

button {
  background: #ff4d6d;
  color: white;
  border: none;
  padding: 8px;
  border-radius: 8px;
}

.cart {
  display: none;
  padding: 10px;
}

.cart-item {
  background: white;
  padding: 10px;
  border-radius: 10px;
  margin-bottom: 10px;
}

.dark .cart-item {
  background: #2a2a2a;
}

.controls {
  display: flex;
  gap: 5px;
  margin-top: 5px;
}

.bottom {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: white;
  padding: 10px;
  border-top: 1px solid #ddd;
}

.dark .bottom {
  background: #2a2a2a;
}
</style>
</head>

<body>

<div class="header">
  🍰 Меню
  <div>
    <button onclick="toggleTheme()">🌙</button>
    <button onclick="openCart()">🛒</button>
  </div>
</div>

<div id="products" class="products"></div>
<div id="cart" class="cart"></div>

<div class="bottom">
💰 <span id="sum">0</span> грн
<button onclick="checkout()">Оплатити</button>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

let cart = JSON.parse(localStorage.getItem("cart") || "{}");
let dark = localStorage.getItem("dark") === "1";

// тема
if(dark) document.body.classList.add("dark");

function toggleTheme(){
  dark = !dark;
  document.body.classList.toggle("dark");
  localStorage.setItem("dark", dark ? "1":"0");
}

// товари
const products = [
  {name:"Макарон", price:40, img:"https://images.unsplash.com/photo-1551024601-bec78aea704b"},
  {name:"Кукіс", price:40, img:"https://images.unsplash.com/photo-1606313564200-e75d5e30476c"},
  {name:"Чізкейк", price:120, img:"https://images.unsplash.com/photo-1612203985729-70726954388c"},
  {name:"Брауні", price:90, img:"https://images.unsplash.com/photo-1606312619070-d48b4c652a52"}
];

// рендер меню
function renderProducts(){
  let html = "";

  products.forEach(p => {
    html += `
    <div class="card">
      <img src="${p.img}">
      <div class="card-content">
        <b>${p.name}</b><br>
        ${p.price} грн<br><br>
        <button onclick="add('${p.name}', ${p.price})">Додати</button>
      </div>
    </div>
    `;
  });

  document.getElementById("products").innerHTML = html;
}

// додати
function add(name, price){
  if(!cart[name]) cart[name] = {price:price, count:0};
  cart[name].count++;
  save();
  update();
}

// кошик
function openCart(){
  document.getElementById("products").style.display="none";
  document.getElementById("cart").style.display="block";
  renderCart();
}

// назад
function back(){
  document.getElementById("products").style.display="block";
  document.getElementById("cart").style.display="none";
}

// рендер кошика
function renderCart(){
  let html = `<button onclick="back()">⬅ Назад</button><br><br>`;

  for(let i in cart){
    let p = cart[i];

    html += `
    <div class="cart-item">
      <b>${i}</b><br>
      ${p.price * p.count} грн

      <div class="controls">
        <button onclick="minus('${i}')">-</button>
        <span>${p.count}</span>
        <button onclick="plus('${i}')">+</button>
        <button onclick="removeItem('${i}')">❌</button>
      </div>
    </div>
    `;
  }

  html += `<button onclick="clearCart()">Очистити кошик</button>`;

  document.getElementById("cart").innerHTML = html;
}

// + -
function plus(name){
  cart[name].count++;
  save(); update(); renderCart();
}

function minus(name){
  cart[name].count--;
  if(cart[name].count <= 0) delete cart[name];
  save(); update(); renderCart();
}

// видалити
function removeItem(name){
  delete cart[name];
  save(); update(); renderCart();
}

// очистити
function clearCart(){
  cart = {};
  save(); update(); renderCart();
}

// сума
function update(){
  let total = 0;
  for(let i in cart){
    total += cart[i].price * cart[i].count;
  }
  document.getElementById("sum").innerText = total;
}

// збереження
function save(){
  localStorage.setItem("cart", JSON.stringify(cart));
}

// 💳 оформлення (поки без реальної оплати)
function checkout(){
  if(Object.keys(cart).length === 0){
    alert("Кошик пустий");
    return;
  }

  let text = "🛒 ЗАМОВЛЕННЯ\n\n";
  let total = 0;

  for(let i in cart){
    let p = cart[i];
    text += i + " x" + p.count + "\n";
    total += p.price*p.count;
  }

  text += "\n💰 " + total + " грн";

  if(tg.initDataUnsafe.user){
    let u = tg.initDataUnsafe.user;
    text += "\n👤 " + (u.username ? "@"+u.username : u.first_name);
  }

  tg.sendData(text);
}

// старт
renderProducts();
update();
</script>

</body>
</html>
