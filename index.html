<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f7f7f7;
}

.header {
  padding: 15px;
  font-size: 22px;
  font-weight: bold;
}

.products {
  padding: 10px;
}

.card {
  background: white;
  border-radius: 12px;
  margin-bottom: 12px;
  overflow: hidden;
}

.card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
}

.card-content {
  padding: 10px;
}

button {
  background: #ff4d6d;
  color: white;
  border: none;
  padding: 8px;
  border-radius: 8px;
  cursor: pointer;
}

.bottom {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: white;
  padding: 10px;
  border-top: 1px solid #ddd;
}
</style>
</head>

<body>

<div class="header">🍰 Меню</div>

<div id="products" class="products"></div>

<div class="bottom">
💰 <span id="sum">0</span> грн
<button onclick="checkout()">Замовити</button>
</div>

<script>
const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSOYKMMFpllEzEtyL4tGb44Dm0Ra0mk7FCC4FsgnvRzjGnwCVt1gyIERrJbbMVpgYEb5kDRqjFkUSUu/pub?output=csv";

let cart = [];
let total = 0;

async function loadMenu() {
  try {
    const res = await fetch(sheetURL);
    const text = await res.text();

    const rows = text.split("\n").slice(1);

rows.forEach(row => {
  if (!row.trim()) return;

  // правильний парсинг CSV
  const parts = row.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g);

  if (!parts || parts.length < 3) return;

  const category = parts[0]?.replace(/"/g, '');
  const name = parts[1]?.replace(/"/g, '');
  const price = parts[2]?.replace(/"/g, '');
  const img = parts[3]?.replace(/"/g, '');
  const desc = parts[4]?.replace(/"/g, '');

  const item = document.createElement("div");
  item.className = "card";

  item.innerHTML = `
    ${img && img !== 'link' ? `<img src="${img}">` : ""}
    <div class="card-content">
      <h3>${name}</h3>
      <p>${desc ? desc.substring(0, 100) + "..." : ""}</p>
      <b>${price} грн</b><br><br>
      <button onclick="addToCart('${name}', ${price})">Додати</button>
    </div>
  `;

  document.getElementById("products").appendChild(item);
});
    const container = document.getElementById("products");

    container.innerHTML = "";

    rows.forEach(row => {
      if (!row.trim()) return;

      let parts = row.split(",");
      if (parts.length < 5) {
        parts = row.split(";");
      }

      const [category, name, price, img, desc] = parts;

      if (!name || !price) return;

      const item = document.createElement("div");
      item.className = "card";

      item.innerHTML = `
        ${img && img !== 'link' ? `<img src="${img.trim()}">` : ""}
        <div class="card-content">
          <h3>${name}</h3>
          <p>${desc ? desc.substring(0, 80) + "..." : ""}</p>
          <b>${price} грн</b><br><br>
          <button onclick="addToCart('${name}', ${price})">Додати</button>
        </div>
      `;

      container.appendChild(item);
    });

  } catch (e) {
    console.error("Помилка завантаження:", e);
  }
}

function addToCart(name, price) {
  cart.push({name, price});
  total += Number(price);

  document.getElementById("sum").innerText = total;
}

function checkout() {
  if (cart.length === 0) {
    alert("Кошик пустий");
    return;
  }

  let text = "🧾 Замовлення:\n\n";

  cart.forEach(item => {
    text += `• ${item.name} — ${item.price} грн\n`;
  });

  text += `\n💰 Разом: ${total} грн`;

  Telegram.WebApp.sendData(text);
}

loadMenu();
</script>

</body>
</html>
