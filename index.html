<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kofein Desserts</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #f5f5f5;
}

h2 {
  padding: 15px;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  padding: 10px;
}

.card {
  background: #fff;
  border-radius: 15px;
  overflow: hidden;
}

.card img {
  width: 100%;
  height: 120px;
  object-fit: cover;
}

.card p {
  padding: 10px;
  margin: 0;
}

.bottom {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #111;
  color: white;
  display: flex;
  justify-content: space-around;
  padding: 10px 0;
}

.loader {
  padding: 20px;
}
</style>
</head>

<body>

<h2>🏠 Головна</h2>

<div id="app">
  <p class="loader">Завантаження...</p>
</div>

<div class="bottom">
  <div>🏠</div>
  <div>📦</div>
  <div>🔍</div>
  <div>🛒</div>
  <div>👤</div>
</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbyvGNngeLKj18EuRlGaCtkTsqgVlPJ2bazvyRQOnt2aHDQVpRXccC0ptOJoqJOU5upuVw/exec?v=1";

fetch(URL)
  .then(res => res.json())
  .then(data => {
    console.log("DATA:", data);

    const app = document.getElementById("app");

    let html = '<div class="grid">';

    data.forEach(item => {
      html += `
        <div class="card">
          <img src="${item.img}">
          <p><b>${item.name}</b></p>
          <p>${item.price} грн</p>
        </div>
      `;
    });

    html += '</div>';

    app.innerHTML = html;
  })
  .catch(err => {
    console.error(err);
    document.getElementById("app").innerHTML = "❌ Помилка завантаження";
  });
</script>

</body>
</html>
