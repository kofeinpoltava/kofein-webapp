<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f7f7f7;
}

.header {
  padding: 15px;
  font-size: 22px;
  font-weight: bold;
  display: flex;
  justify-content: space-between;
}

.products, .cart {
  padding: 10px;
}

.products {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.card {
  background: white;
  border-radius: 12px;
  overflow: hidden;
}

.card img {
  width: 100%;
  height: 130px;
  object-fit: cover;
}

.card-content {
  padding: 10px;
}

button {
  background: #ff4d6d;
  color: white;
  border: none;
  padding: 6px;
  border-radius: 6px;
}

.cart {
  display: none;
}

.cart-item {
  background: white;
  margin-bottom: 8px;
  padding: 10px;
  border-radius: 10px;
}

.bottom {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: white;
  padding: 10px;
  border-top: 1px solid #ddd;
}
</style>
</head>

<body>

<div class="header">
  🍰 Десерти
  <button onclick="openCart()">🛒</button>
</div>

<div id="products" class="products"></div>

<div id="cart" class="cart"></div>

<div class="bottom">
💰 <span id="sum">0</span> грн
<button onclick="sendOrder()">Оформити</button>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

const products = [
  {name:"Макарон", price:40, img:"https://images.unsplash.com/photo-1551024601-bec78aea704b"},
  {name:"Кукіс", price:40, img:"https://images.unsplash.com/photo-1606313564200-e75d5e30476c"},
  {name:"Чізкейк", price:120, img:"https://images.unsplash.com/photo-1612203985729-70726954388c"},
  {name:"Брауні", price:90, img:"https://images.unsplash.com/photo-1606312619070-d48b4c652a52"}
];

let cart = {};
let comment = "";
let delivery = "Самовивіз";

// рендер товарів
function renderProducts(){
  let html = "";
  products.forEach(p => {
    html += `
      <div class="card">
        <img src="${p.img}">
        <div class="card-content">
          <div>${p.name}</div>
          <div>${p.price} грн</div>
          <button onclick="add('${p.name}', ${p.price})">Додати</button>
        </div>
      </div>
    `;
  });
  document.getElementById("products").innerHTML = html;
}

// додати
function add(name, price){
  if(!cart[name]) cart[name] = {price: price, count:0};
  cart[name].count++;
  update();
}

// кошик
function openCart(){
  document.getElementById("products").style.display = "none";
  document.getElementById("cart").style.display = "block";
  renderCart();
}

// назад
function back(){
  document.getElementById("products").style.display = "grid";
  document.getElementById("cart").style.display = "none";
}

// рендер кошика
function renderCart(){
  let html = "<button onclick='back()'>⬅ Назад</button><br><br>";

  for(let item in cart){
    let p = cart[item];
    html += `
      <div class="cart-item">
        ${item} x${p.count} — ${p.price * p.count} грн
      </div>
    `;
  }

  html += `
    <br>
    <div>
      📝 Коментар:<br>
      <input type="text" onchange="comment=this.value">
    </div>

    <br>
    <div>
      🚚 Доставка:<br>
      <select onchange="delivery=this.value">
        <option>Самовивіз</option>
        <option>Кур'єр</option>
      </select>
    </div>

    <br>
    <button onclick="clearCart()">Очистити кошик</button>
  `;

  document.getElementById("cart").innerHTML = html;
}

// очистити
function clearCart(){
  cart = {};
  update();
  renderCart();
}

// сума
function update(){
  let total = 0;
  for(let i in cart){
    total += cart[i].price * cart[i].count;
  }
  document.getElementById("sum").innerText = total;
}

// відправка
function sendOrder(){
  if(Object.keys(cart).length === 0){
    alert("Кошик пустий");
    return;
  }

  let text = "🛒 НОВЕ ЗАМОВЛЕННЯ\n\n";

  for(let i in cart){
    let p = cart[i];
    text += "🍰 " + i + " x" + p.count + "\n";
  }

  text += "\n🚚 " + delivery;
  if(comment) text += "\n📝 " + comment;

  text += "\n💰 Сума: " + document.getElementById("sum").innerText;

  if (tg.initDataUnsafe.user) {
    let u = tg.initDataUnsafe.user;
    text += "\n👤 " + (u.username ? "@" + u.username : u.first_name);
  }

  tg.sendData(text);
}

renderProducts();
</script>

</body>
</html>
