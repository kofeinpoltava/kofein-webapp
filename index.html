<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f7f7f7;
}

.header {
  padding: 15px;
  font-size: 22px;
  font-weight: bold;
}

.categories {
  display: flex;
  overflow-x: auto;
  padding: 10px;
}

.categories button {
  margin-right: 8px;
  background: #eee;
  color: #000;
  border: none;
  padding: 6px 10px;
  border-radius: 8px;
}

.products {
  padding: 10px;
  padding-bottom: 100px; /* щоб кнопка не перекривала */
}

.card {
  background: white;
  border-radius: 12px;
  margin-bottom: 12px;
  overflow: hidden;
}

.card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
}

.card-content {
  padding: 10px;
}

.qty-buttons {
  margin-top: 10px;
}

.qty-buttons button {
  margin: 3px;
  background: #eee;
  color: #000;
}

button {
  background: #ff4d6d;
  color: white;
  border: none;
  padding: 8px;
  border-radius: 8px;
  cursor: pointer;
}

.bottom {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: white;
  padding: 10px;
  border-top: 1px solid #ddd;
  z-index: 9999;
}
</style>
</head>

<body>

<div class="header">🍰 Меню</div>
<div id="categories" class="categories"></div>
<div id="products" class="products"></div>

<div class="bottom">
💰 <span id="sum">0</span> грн
<button onclick="checkout()">Замовити</button>
</div>

<script>
const sheetURL = "https://script.google.com/macros/s/AKfycbwy6lgjcTbXFWpRMKLCngkP8gP7oygRjmWXzVY4E5S65bH6KqmUsa6njn-Hiz8hJLCZ9w/exec?v=12";

let allProducts = [];
let cart = [];
let total = 0;

async function loadMenu() {
  const res = await fetch(sheetURL);
  const data = await res.json();

  allProducts = data.map(item => ({
    category: item.category?.toString().trim(),
    name: item.name,
    price: Number(item.price) || 0,
    img: item.img,
    desc: item.desc,
    steps: item.steps ? item.steps.split(",").map(n => Number(n)) : [1, 5, 10]
  }));

  renderCategories();
  renderProducts("Всі");
}

function renderCategories() {
  const container = document.getElementById("categories");

  const categories = ["Всі", ...new Set(
    allProducts.map(p => p.category).filter(c => c)
  )];

  container.innerHTML = "";

  categories.forEach(cat => {
    const btn = document.createElement("button");
    btn.innerText = cat;
    btn.onclick = () => renderProducts(cat);
    container.appendChild(btn);
  });
}

function renderProducts(category) {
  const container = document.getElementById("products");
  container.innerHTML = "";

  const filtered = category === "Всі"
    ? allProducts
    : allProducts.filter(p => p.category === category);

  filtered.forEach(p => {
    const item = document.createElement("div");
    item.className = "card";

    const buttons = p.steps.map(s =>
      `<button onclick="addToCart('${p.name}', ${p.price}, ${s})">+${s}</button>`
    ).join("");

    item.innerHTML = `
      ${p.img && p.img !== 'link' ? `<img src="${p.img}">` : ""}
      <div class="card-content">
        <h3>${p.name}</h3>
        <p>${p.desc || ""}</p>
        <b>${p.price} грн</b>

        <div class="qty-buttons">
          ${buttons}
        </div>
      </div>
    `;

    container.appendChild(item);
  });
}

function addToCart(name, price, qty) {
  const existing = cart.find(i => i.name === name);

  if (existing) {
    existing.qty += qty;
  } else {
    cart.push({name, price, qty});
  }

  total += price * qty;
  document.getElementById("sum").innerText = total;
}

function checkout() {
  if (cart.length === 0) {
    alert("Кошик пустий");
    return;
  }

  let text = "🧾 Замовлення:\n\n";

  cart.forEach(item => {
    text += `• ${item.name} x${item.qty} — ${item.price * item.qty} грн\n`;
  });

  text += `\n💰 Разом: ${total} грн`;

  if (window.Telegram && Telegram.WebApp) {
    Telegram.WebApp.sendData(text);
  } else {
    alert(text);
  }
}

loadMenu();
</script>

</body>
</html>
</script>

</body>
</html>
