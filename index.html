<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f7f7f7;
}

.header {
  padding: 15px;
  font-size: 22px;
  font-weight: bold;
}

.products {
  padding: 10px;
}

.card {
  background: white;
  border-radius: 12px;
  margin-bottom: 12px;
  overflow: hidden;
}

.card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
}

.card-content {
  padding: 10px;
}

button {
  background: #ff4d6d;
  color: white;
  border: none;
  padding: 8px;
  border-radius: 8px;
}

.bottom {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: white;
  padding: 10px;
  border-top: 1px solid #ddd;
}
</style>
</head>

<body>

<div class="header">🍰 Меню</div>

<div id="products" class="products"></div>

<div class="bottom">
💰 <span id="sum">0</span> грн
<button onclick="checkout()">Замовити</button>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

let cart = {};
let products = [];

// 🔥 ПІДКЛЮЧЕННЯ ТАБЛИЦІ
fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vSOYKMMFpllEzEtyL4tGb44Dm0Ra0mk7FCC4FsgnvRzjGnwCVt1gyIERrJbbMVpgYEb5kDRqjFkUSUu/pub?output=csv")
  .then(res => res.text())
  .then(csv => {
    const rows = csv.split("\n").slice(1);

    products = rows.map(row => {
      const [name, price, img] = row.split(",");
      return {
        name: name.trim(),
        price: Number(price),
        img: img.trim()
      };
    });

    renderProducts();
  });

// рендер
function renderProducts(){
  let html = "";

  products.forEach(p => {
    html += `
    <div class="card">
      <img src="${p.img}">
      <div class="card-content">
        <b>${p.name}</b><br>
        ${p.price} грн<br><br>
        <button onclick="add('${p.name}', ${p.price})">Додати</button>
      </div>
    </div>
    `;
  });

  document.getElementById("products").innerHTML = html;
}

// кошик
function add(name, price){
  if(!cart[name]) cart[name] = {price, count:0};
  cart[name].count++;
  update();
}

function update(){
  let total = 0;
  for(let i in cart){
    total += cart[i].price * cart[i].count;
  }
  document.getElementById("sum").innerText = total;
}

// оформлення
function checkout(){
  if(Object.keys(cart).length === 0){
    alert("Кошик пустий");
    return;
  }

  let text = "🛒 ЗАМОВЛЕННЯ\n\n";
  let total = 0;

  for(let i in cart){
    let p = cart[i];
    text += i + " x" + p.count + "\n";
    total += p.price*p.count;
  }

  text += "\n💰 " + total + " грн";

  if(tg.initDataUnsafe.user){
    let u = tg.initDataUnsafe.user;
    text += "\n👤 " + (u.username ? "@"+u.username : u.first_name);
  }

  tg.sendData(text);
}
</script>

</body>
</html>
