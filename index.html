<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menu</title>
<style>
body { margin:0; font-family:sans-serif; background:#f5f5f5; }
.screen { display:none; padding-bottom:70px; }
.active { display:block; }
.header { padding:15px; font-size:20px; font-weight:bold; }
.grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:10px; }
.card { background:#fff; border-radius:12px; overflow:hidden; }
.card img { width:100%; height:120px; object-fit:cover; }
.card p { padding:10px; }
.bottom-nav {
  position:fixed; bottom:0; left:0; right:0;
  height:60px; background:#222; display:flex;
  justify-content:space-around; align-items:center;
  color:#fff;
}
.nav-btn { cursor:pointer; }
.cart-bar {
  position:fixed; bottom:60px; left:0; right:0;
  background:#fff; padding:10px; display:flex;
  justify-content:space-between; align-items:center;
}
button { padding:10px 15px; border:none; border-radius:8px; background:#ff4d6d; color:#fff; cursor:pointer; }
</style>
</head>
<body>

<div id="home" class="screen active">
  <div class="header">🏠 Головна</div>
  <div class="grid">
    <div class="card"><img src="https://picsum.photos/200/120"><p>Макарон</p></div>
    <div class="card"><img src="https://picsum.photos/200/121"><p>Печиво</p></div>
  </div>
</div>

<div id="catalog" class="screen">
  <div class="header">📦 Каталог</div>
  <div id="products"></div>
</div>

<div id="search" class="screen">
  <div class="header">🔍 Пошук</div>
  <input placeholder="Пошук..." style="width:90%;margin:10px;padding:10px;">
</div>

<div id="cart" class="screen">
  <div class="header">🛒 Кошик</div>
  <div id="cartItems"></div>
</div>

<div id="profile" class="screen">
  <div class="header">👤 Профіль</div>
  <p style="padding:10px;">Ваш профіль</p>
</div>

<div class="cart-bar">
  <div id="total">0 грн</div>
  <button onclick="checkout()">Замовити</button>
</div>

<div class="bottom-nav">
  <div class="nav-btn" onclick="show('home')">🏠</div>
  <div class="nav-btn" onclick="show('catalog')">📦</div>
  <div class="nav-btn" onclick="show('search')">🔍</div>
  <div class="nav-btn" onclick="show('cart')">🛒</div>
  <div class="nav-btn" onclick="show('profile')">👤</div>
</div>

<script>
let cart = [];
let total = 0;

function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function add(name, price){
  cart.push({name, price});
  total += price;
  document.getElementById('total').innerText = total + ' грн';
  renderCart();
}

function renderProducts(){
  const list = [
    {name:'Макарон', price:40},
    {name:'Еклер', price:50}
  ];

  const el = document.getElementById('products');
  el.innerHTML = '';

  list.forEach(p=>{
    el.innerHTML += `
      <div class="card">
        <p>${p.name}</p>
        <p>${p.price} грн</p>
        <button onclick="add('${p.name}', ${p.price})">Додати</button>
      </div>
    `;
  });
}

function renderCart(){
  const el = document.getElementById('cartItems');
  el.innerHTML = '';
  cart.forEach(i=>{
    el.innerHTML += `<p>${i.name} - ${i.price} грн</p>`;
  });
}

function checkout(){
  if(cart.length===0){ alert('Кошик пустий'); return; }

  let text = 'Замовлення:\n';
  cart.forEach(i=> text += i.name + ' ' + i.price + '\n');
  text += 'Разом: ' + total;

  if(window.Telegram && Telegram.WebApp){
    Telegram.WebApp.sendData(text);
  } else {
    alert(text);
  }
}

renderProducts();
</script>

</body>
</html>

</html>
