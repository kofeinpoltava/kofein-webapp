<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #f5f5f5;
}

#menu {
  padding: 10px;
  padding-bottom: 80px;
}

.card {
  background: white;
  border-radius: 12px;
  padding: 10px;
  margin-bottom: 10px;
}

.card img {
  width: 100%;
  border-radius: 10px;
}

.qty button {
  margin: 5px;
  padding: 5px 10px;
  border-radius: 8px;
  border: none;
  background: #eee;
}

.bottom {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: white;
  display: flex;
  justify-content: space-between;
  padding: 10px;
  box-shadow: 0 -2px 5px rgba(0,0,0,0.1);
  z-index: 9999;
}

.order-btn {
  background: #ff4d6d;
  color: white;
  border: none;
  padding: 10px 20px;
  border-radius: 10px;
  cursor: pointer;
}
</style>
</head>

<body>

<div id="menu">Завантаження...</div>

<div class="bottom">
  <div id="total">0 грн</div>
  <button class="order-btn" onclick="order()">Замовити</button>
</div>

<script>
const sheetURL = "ВСТАВ СВІЙ URL СЮДИ?v=1";

let cart = {};
let total = 0;

fetch(sheetURL)
  .then(res => res.json())
  .then(data => {
    const menu = document.getElementById("menu");
    menu.innerHTML = "";

    data.forEach(item => {
      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <img src="${item.img}">
        <h3>${item.name}</h3>
        <p>${item.desc}</p>
        <b>${item.price} грн</b>
        <div class="qty">
          ${item.qty.map(q => `<button onclick="add('${item.name}', ${item.price}, ${q})">+${q}</button>`).join("")}
        </div>
      `;

      menu.appendChild(div);
    });
  });

function add(name, price, qty) {
  if (!cart[name]) cart[name] = 0;
  cart[name] += qty;
  total += price * qty;

  document.getElementById("total").innerText = total + " грн";
}

function order() {
  if (total === 0) {
    alert("Кошик пустий");
    return;
  }

  alert("Замовлення на " + total + " грн оформлено!");
}
</script>

</body>
</html>
