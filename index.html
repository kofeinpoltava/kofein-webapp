<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f7f7f7;
}

.header {
  padding: 15px;
  font-size: 22px;
  font-weight: bold;
}

.products {
  padding: 10px;
}

.card {
  background: white;
  border-radius: 12px;
  margin-bottom: 12px;
  overflow: hidden;
}

.card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
}

.card-content {
  padding: 10px;
}

button {
  background: #ff4d6d;
  color: white;
  border: none;
  padding: 8px;
  border-radius: 8px;
}

.bottom {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: white;
  padding: 10px;
  border-top: 1px solid #ddd;
}
</style>
</head>

<body>

<div class="header">🍰 Меню</div>

<div id="products" class="products"></div>

<div class="bottom">
💰 <span id="sum">0</span> грн
<button onclick="checkout()">Замовити</button>
</div>

<script>
const sheetURL = https://docs.google.com/spreadsheets/d/e/2PACX-1vSOYKMMFpllEzEtyL4tGb44Dm0Ra0mk7FCC4FsgnvRzjGnwCVt1gyIERrJbbMVpgYEb5kDRqjFkUSUu/pub?output=csv

async function loadMenu() {
  const res = await fetch(sheetURL);
  let text = await res.text();

  // виправляємо кодування
  text = new TextDecoder("utf-8").decode(new Uint8Array([...text].map(c => c.charCodeAt(0))));

  const rows = text.split("\n").slice(1);
  const container = document.getElementById("menu");

  container.innerHTML = "";

  rows.forEach(row => {
    if (!row.trim()) return;

    // підтримка і , і ;
    let parts = row.split(",");
    if (parts.length < 3) {
      parts = row.split(";");
    }

    const [name, price, img] = parts;

    if (!name) return;

    const item = document.createElement("div");
    item.style.marginBottom = "15px";

    item.innerHTML = `
      <div style="background:#fff;padding:10px;border-radius:12px">
        ${img ? `<img src="${img.trim()}" style="width:100%;border-radius:10px">` : ""}
        <h3>${name}</h3>
        <p>${price} грн</p>
        <button onclick="addToCart('${name}', ${price})">Додати</button>
      </div>
    `;

    container.appendChild(item);
  });
}

let cart = [];
let total = 0;

function addToCart(name, price) {
  cart.push({name, price});
  total += Number(price);

  document.getElementById("total").innerText = total + " грн";
}

loadMenu();
</script>
