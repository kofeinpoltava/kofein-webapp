<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f7f7f7;
}

.header {
  padding: 15px;
  font-size: 22px;
  font-weight: bold;
}

.categories {
  display: flex;
  overflow-x: auto;
  padding: 10px;
}

.categories button {
  margin-right: 8px;
  background: #eee;
  color: #000;
}

.products {
  padding: 10px;
}

.card {
  background: white;
  border-radius: 12px;
  margin-bottom: 12px;
  overflow: hidden;
}

.card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
}

.card-content {
  padding: 10px;
}

button {
  background: #ff4d6d;
  color: white;
  border: none;
  padding: 8px;
  border-radius: 8px;
  cursor: pointer;
}

.bottom {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: white;
  padding: 10px;
  border-top: 1px solid #ddd;
}
</style>
</head>

<body>

<div class="header">🍰 Меню</div>

<div id="categories" class="categories"></div>

<div id="products" class="products"></div>

<div class="bottom">
💰 <span id="sum">0</span> грн
<button onclick="checkout()">Замовити</button>
</div>

<script>
const sheetURL = "https://script.google.com/macros/s/AKfycbwn8CyJh6vBW541JC1eSEkXYZLzW0KNDzuwIiIihekdrXNosQvo6Kw5mzNV2Yngua1LBw/exec";

let allProducts = [];
let cart = [];
let total = 0;

async function loadMenu() {
  const res = await fetch(sheetURL);
  const data = await res.json();

  allProducts = data.map(item => ({
    category: item.category?.toString().trim(),
    name: item.name,
    price: Number(item.price) || 0,
    img: item.img,
    desc: item.desc
  }));

  renderCategories();
  renderProducts("Всі");
}

function renderCategories() {
  const container = document.getElementById("categories");

  const categories = ["Всі", ...new Set(
    allProducts
      .map(p => p.category)
      .filter(cat => cat && !cat.includes("Склад"))
  )];

  container.innerHTML = "";

  categories.forEach(cat => {
    const btn = document.createElement("button");
    btn.innerText = cat;
    btn.onclick = () => renderProducts(cat);
    container.appendChild(btn);
  });
}

function renderProducts(category) {
  const container = document.getElementById("products");
  container.innerHTML = "";

  const filtered = category === "Всі"
    ? allProducts
    : allProducts.filter(p => p.category === category);

  filtered.forEach(p => {
    const item = document.createElement("div");
    item.className = "card";

    item.innerHTML = `
      ${p.img && p.img !== 'link' ? `<img src="${p.img}">` : ""}
      <div class="card-content">
        <h3>${p.name}</h3>
        <p>${p.desc ? p.desc.replace(/\n/g, "<br>") : ""}</p>
        <b>${p.price} грн</b><br><br>
        <button onclick="addToCart('${p.name}', ${p.price})">Додати</button>
      </div>
    `;

    container.appendChild(item);
  });
}

function addToCart(name, price) {
  cart.push({name, price});
  total += Number(price);
  document.getElementById("sum").innerText = total;
}

function checkout() {
  if (cart.length === 0) {
    alert("Кошик пустий");
    return;
  }

  let text = "🧾 Замовлення:\n\n";

  cart.forEach(item => {
    text += `• ${item.name} — ${item.price} грн\n`;
  });

  text += `\n💰 Разом: ${total} грн`;

  if (window.Telegram && Telegram.WebApp) {
    Telegram.WebApp.sendData(text);
  } else {
    alert(text);
  }
}

loadMenu();
</script>

</body>
</html>
